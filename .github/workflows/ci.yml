name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install ruff

      - name: Ruff check
        run: ruff check . --config ruff.toml

      - name: Ruff format check
        run: ruff format . --config ruff.toml --check

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - run: pip install -r requirements.txt

      - name: Start Firestore emulator
        run: |
          firebase emulators:start --only firestore --project demo-test &
          for i in $(seq 1 15); do
            curl -s http://localhost:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run pytest with coverage
        run: pytest --tb=short -q --cov --cov-fail-under=80
        env:
          JWT_SECRET: ci-test-secret
          ADMIN_API_KEY: ci-test-admin-key
          ADMIN_CHANNEL_IDS: UC_test_channel
          ECPAY_HASH_KEY: test_hash_key_1234567
          ECPAY_HASH_IV: test_hash_iv_12345
          ECPAY_MERCHANT_ID: "2000132"
          FIRESTORE_EMULATOR_HOST: localhost:8080

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend_react/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend_react/package-lock.json

      - run: npm ci

      - name: Run Vitest
        run: npm test

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend_react/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: dummy
          VITE_FIREBASE_MEASUREMENT_ID: G-DUMMY
          VITE_GOOGLE_CLIENT_ID: dummy
          VITE_API_BASE: https://dummy.run.app
          VITE_ENABLE_SETTINGS: "false"
