# pre-commit hooks — 在 commit 前自動檢查程式碼品質
# 安裝: pip install pre-commit（由 global git hook 自動串接，不需執行 pre-commit install）
# 手動跑全部: pre-commit run --all-files

repos:
  # Ruff — Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix, --config, backend/ruff.toml]
        files: ^backend/
        exclude: ^backend/tools/
      - id: ruff-format
        args: [--config, backend/ruff.toml]
        files: ^backend/
        exclude: ^backend/tools/

  # pytest — Backend 單元測試
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd backend && python -m pytest tests/ -q --cov --cov-fail-under=80'
        language: system
        files: ^backend/
        pass_filenames: false

  # ESLint — TypeScript/React linter
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend_react && npx eslint src/'
        language: system
        files: ^frontend_react/src/.*\.(ts|tsx)$
        pass_filenames: false
