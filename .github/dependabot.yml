version: 2
updates:
  # Python (pip) — 後端依賴
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10

  # JavaScript (npm) — 前端依賴
  - package-ecosystem: "npm"
    directory: "/frontend_react"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10

  # GitHub Actions — CI/CD workflow 依賴
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci):"
    open-pull-requests-limit: 5
