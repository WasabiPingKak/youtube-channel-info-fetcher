# pre-commit hooks — 在 commit 前自動檢查程式碼品質
# 安裝: pip install pre-commit（由 global git hook 自動串接，不需執行 pre-commit install）
# 手動跑全部: pre-commit run --all-files

repos:
  # detect-secrets — 機密資訊掃描
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'node_modules/|frontend_react/dist/'

  # Ruff — Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix, --config, backend/ruff.toml]
        files: ^backend/
        exclude: ^backend/tools/
      - id: ruff-format
        args: [--config, backend/ruff.toml]
        files: ^backend/
        exclude: ^backend/tools/

  # pytest — Backend 單元測試
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd backend && python -m pytest tests/ -x -q'
        language: system
        files: ^backend/
        pass_filenames: false

  # ESLint — TypeScript/React linter
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend_react && npx eslint src/ --no-warn-ignored'
        language: system
        files: ^frontend_react/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc
        name: tsc (frontend type check)
        entry: bash -c 'cd frontend_react && npx tsc --noEmit'
        language: system
        files: ^frontend_react/src/.*\.(ts|tsx)$
        pass_filenames: false
