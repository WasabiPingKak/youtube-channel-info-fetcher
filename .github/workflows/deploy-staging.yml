name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: vtuber-channel-analyzer-v3
  GCP_REGION: asia-east1

jobs:
  # ── 品質閘門 ──────────────────────────────────────
  backend-check:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ruff check
        run: ruff check . --config ruff.toml

      - name: Ruff format check
        run: ruff format . --config ruff.toml --check

      - name: Run pytest
        run: pytest --tb=short -q
        env:
          JWT_SECRET: ci-test-secret
          ADMIN_API_KEY: ci-test-admin-key
          ADMIN_CHANNEL_IDS: UC_test_channel
          ECPAY_HASH_KEY: test_hash_key_1234567
          ECPAY_HASH_IV: test_hash_iv_12345
          ECPAY_MERCHANT_ID: "2000132"

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend_react/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build (staging)
        run: npm run build -- --mode staging
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.STAGING_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.STAGING_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.STAGING_VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.STAGING_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.STAGING_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.STAGING_VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.STAGING_VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.STAGING_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: ${{ vars.STAGING_GOOGLE_REDIRECT_URI }}
          VITE_API_BASE: ""
          VITE_ENABLE_SETTINGS: "true"
          VITE_DEFAULT_CHANNEL_ID: ${{ vars.STAGING_INPUT_CHANNEL }}

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-staging-dist
          path: frontend_react/dist
          retention-days: 1

  # ── 部署 Backend ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Staging)
    needs: [backend-check]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write version.txt
        run: echo "$(git rev-parse --short=6 HEAD)" > version.txt

      - name: Build container image
        run: |
          IMAGE="gcr.io/${{ env.GCP_PROJECT_ID }}/youtube-api-staging-service:latest"
          BUILD_ID=$(gcloud builds submit --tag "$IMAGE" --async --format='value(id)' --quiet .)
          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "⏳ Build submitted: $BUILD_ID"

          # 輪詢等待 build 完成
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null)
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ Build succeeded"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "❌ Build failed: $STATUS"
              gcloud builds describe "$BUILD_ID" --format='value(statusDetail)' 2>/dev/null || true
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy youtube-api-staging-service \
            --image "${{ env.IMAGE }}" \
            --region "${{ env.GCP_REGION }}" \
            --max-instances=3 \
            --allow-unauthenticated \
            --update-secrets "\
          JWT_SECRET=youtube-api-jwt-secret:latest,\
          API_KEY=youtube-api-api-key:latest,\
          GOOGLE_CLIENT_SECRET=youtube-api-google-client-secret:latest,\
          ADMIN_API_KEY=youtube-api-admin-api-key:latest,\
          ADMIN_CHANNEL_IDS=ADMIN_CHANNEL_IDS:latest,\
          ECPAY_MERCHANT_ID=ecpay-merchant-id-staging:latest,\
          ECPAY_HASH_KEY=ecpay-hash-key-staging:latest,\
          ECPAY_HASH_IV=ecpay-hash-iv-staging:latest" \
            --set-env-vars "^@@^INPUT_CHANNEL=${{ vars.STAGING_INPUT_CHANNEL }}@@GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}@@GOOGLE_CLIENT_ID=${{ vars.STAGING_GOOGLE_CLIENT_ID }}@@GOOGLE_REDIRECT_URI=${{ vars.STAGING_GOOGLE_REDIRECT_URI }}@@FRONTEND_BASE_URL=${{ vars.STAGING_FRONTEND_BASE_URL }}@@ALLOWED_ORIGINS=${{ vars.STAGING_ALLOWED_ORIGINS }}@@WEBSUB_CALLBACK_URL=${{ vars.STAGING_WEBSUB_CALLBACK_URL }}@@FIRESTORE_DATABASE=${{ vars.STAGING_FIRESTORE_DATABASE }}@@GAME_ALIAS_ENDPOINT=${{ vars.STAGING_GAME_ALIAS_ENDPOINT }}@@CLOUD_TASKS_LOCATION=${{ env.GCP_REGION }}@@CLOUD_TASKS_QUEUE=websub-subscribe@@CLOUD_RUN_SERVICE_URL=${{ vars.STAGING_CLOUD_RUN_SERVICE_URL }}" \
            --quiet

      - name: Route traffic to latest
        run: |
          gcloud run services update-traffic youtube-api-staging-service \
            --to-latest \
            --region "${{ env.GCP_REGION }}" \
            --quiet

  # ── 部署 Frontend ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Staging)
    needs: [frontend-check]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          name: frontend-staging-dist
          path: frontend_react/dist

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:staging --project "${{ env.GCP_PROJECT_ID }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
